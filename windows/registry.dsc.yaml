$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: downloads-groupascending-native
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: GroupAscending
      _exist: false

  - name: downloads-groupby-native
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: GroupBy
      _exist: false

  - name: downloads-primaryproperty-native
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: PrimaryProperty
      _exist: false

  - name: downloads-sortbylist-native
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: SortByList
      valueData:
        String: prop:System.ItemNameDisplay

  - name: downloads-groupascending-wow6432
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: GroupAscending
      _exist: false

  - name: downloads-groupby-wow6432
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: GroupBy
      _exist: false

  - name: downloads-primaryproperty-wow6432
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: PrimaryProperty
      _exist: false

  - name: downloads-sortbylist-wow6432
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Explorer\FolderTypes\{885a186e-a440-4ada-812b-db871b942259}\TopViews\{00000000-0000-0000-0000-000000000000}
      valueName: SortByList
      valueData:
        String: prop:System.ItemNameDisplay

  - name: disable-search-box-suggestions
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows\Explorer
      valueName: DisableSearchBoxSuggestions
      valueData:
        UInt32: 1

  - name: disable-search-box-suggestions-current-user
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKCU\SOFTWARE\Policies\Microsoft\Windows\Explorer
      valueName: DisableSearchBoxSuggestions
      valueData:
        UInt32: 1

  - name: disable-search-web-results
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search
      valueName: ConnectedSearchUseWeb
      valueData:
        UInt32: 0

  - name: disable-search-web-results-metered
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search
      valueName: ConnectedSearchUseWebOverMeteredConnections
      valueData:
        UInt32: 0

  - name: rtc-is-utc
    type: Microsoft.Windows/Registry
    properties:
      keyPath: HKLM\SYSTEM\CurrentControlSet\Control\TimeZoneInformation
      valueName: RealTimeIsUniversal
      valueData:
        UInt32: 1
